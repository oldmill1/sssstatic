# SSSStatic Multi-Page Configuration Example
site_name: "My Portfolio"
_theme: "dark"
_title: "Welcome to My Portfolio"

# Main homepage content
about_me:
  name: "John Developer"
  role: "Full-Stack Developer & AI Enthusiast"
  location: "San Francisco, CA"
  
  skills:
    - "Python (Django, Flask, FastAPI)"
    - "JavaScript (React, Node.js, TypeScript)"
    - "Machine Learning (TensorFlow, PyTorch)"
    - "Cloud Computing (AWS, Docker, Kubernetes)"
  
  experience:
    - "Senior Developer at TechCorp (2020-2024)"
    - "Full-Stack Developer at StartupXYZ (2018-2020)"
    - "Junior Developer at WebAgency (2016-2018)"

# Hero banner for homepage
_hero_banner:
  headline: "Building the Future with Code"
  subtitle: "Passionate about creating innovative solutions that make a difference"
  hero_image: "hero-image.jpg"
  columns:
    - title: "Build"
      description: "Creating robust, scalable applications"
      image: "https://dummyimage.com/300x200/10B981/ffffff&text=Build"
    - title: "Deploy"
      description: "Seamless deployment and DevOps practices"
      image: "https://dummyimage.com/300x200/F59E0B/ffffff&text=Deploy"
    - title: "Scale"
      description: "Growing applications that handle millions of users"
      image: "https://dummyimage.com/300x200/8B5CF6/ffffff&text=Scale"

# Project cards
_card:
  - name: "AI Chat Assistant"
    description: "Intelligent chatbot powered by GPT-4 with custom training"
    url: "https://github.com/johndev/ai-chat"
    status: "active"
  - name: "E-commerce Platform"
    description: "Full-stack e-commerce solution with React and Django"
    url: "https://github.com/johndev/ecommerce"
    status: "completed"
  - name: "Data Visualization Tool"
    description: "Interactive dashboards for business intelligence"
    url: "https://github.com/johndev/dataviz"
    status: "active"

# Footer for homepage
_footer:
  headline: "Let's connect! Find me on [GitHub](https://github.com/johndev) and [LinkedIn](https://linkedin.com/in/johndev)"

# Multi-page configuration
_page:
  # About Page
  - _name: "About"
    _title: "About John Developer"
    _footer:
      headline: "Learn more about my journey and passion for technology"
    
    personal_story:
      - "Started coding at age 14 with HTML and CSS"
      - "Self-taught developer with a passion for learning"
      - "Believes in the power of technology to solve real-world problems"
      - "Always excited about the latest trends in AI and machine learning"
    
    education:
      - "Computer Science Degree from University of California (2016)"
      - "AWS Certified Solutions Architect (2022)"
      - "Google Cloud Professional Developer (2023)"
    
    interests:
      - "Open source contribution"
      - "Mentoring junior developers"
      - "Photography and travel"
      - "Reading about emerging technologies"

  # Projects Page
  - _name: "Projects"
    _title: "My Projects & Portfolio"
    _footer:
      headline: "Check out my work on [GitHub](https://github.com/johndev) and [Dribbble](https://dribbble.com/johndev)"
    
    featured_projects:
      - "[AI Chat Assistant](https://github.com/johndev/ai-chat) - GPT-4 powered chatbot with custom training data"
      - "[E-commerce Platform](https://github.com/johndev/ecommerce) - Full-stack solution with React, Django, and PostgreSQL"
      - "[Data Visualization Tool](https://github.com/johndev/dataviz) - Interactive dashboards with D3.js and Python"
      - "[Mobile App](https://github.com/johndev/mobile-app) - React Native app for task management"
    
    open_source:
      - "Contributing to popular open source projects"
      - "Maintaining several npm packages"
      - "Writing technical blog posts and tutorials"
      - "Speaking at local developer meetups"
    
    technologies:
      - "Frontend: React, Vue.js, TypeScript, Tailwind CSS"
      - "Backend: Python, Node.js, Django, FastAPI, Express"
      - "Database: PostgreSQL, MongoDB, Redis"
      - "Cloud: AWS, Google Cloud, Docker, Kubernetes"
      - "AI/ML: TensorFlow, PyTorch, OpenAI API, LangChain"

  # Contact Page
  - _name: "Contact"
    _title: "Get In Touch"
    _footer:
      headline: "Looking forward to hearing from you!"
    
    contact_info:
      email: "john@example.com"
      phone: "+1 (555) 123-4567"
      location: "San Francisco, CA"
      timezone: "Pacific Standard Time (PST)"
    
    social_links:
      - "[GitHub](https://github.com/johndev) - My code repositories"
      - "[LinkedIn](https://linkedin.com/in/johndev) - Professional network"
      - "[Twitter](https://twitter.com/johndev) - Tech thoughts and updates"
      - "[Medium](https://medium.com/@johndev) - Technical writing"
    
    availability:
      - "Open to new opportunities and collaborations"
      - "Available for freelance projects"
      - "Interested in speaking engagements"
      - "Happy to mentor aspiring developers"
    
    preferred_contact:
      - "Email for business inquiries"
      - "LinkedIn for professional networking"
      - "GitHub for technical discussions"
      - "Twitter for quick questions"

  # Blog Page (if you want to add a blog)
  - _name: "Blog"
    _title: "My Thoughts on Technology"
    _footer:
      headline: "Follow my journey in tech on [Medium](https://medium.com/@johndev)"
    
    recent_posts:
      - "[Building Scalable APIs with FastAPI](https://medium.com/@johndev/fastapi-guide)"
      - "[The Future of AI in Web Development](https://medium.com/@johndev/ai-web-dev)"
      - "[Docker Best Practices for Developers](https://medium.com/@johndev/docker-tips)"
      - "[Why I Switched to TypeScript](https://medium.com/@johndev/typescript-journey)"
    
    writing_topics:
      - "Web development tutorials and guides"
      - "AI and machine learning insights"
      - "DevOps and deployment strategies"
      - "Career advice for developers"
      - "Technology trends and predictions"
