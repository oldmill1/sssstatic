# SSSStatic Library Website Configuration
site_name: "SSSStatic"
_title: "SSSStatic - Simple Static Site Generator"


# Main features
features:
  - "YAML-based configuration - no complex templating"
  - "Multiple built-in themes (dark/light)"
  - "Multi-page support with automatic navigation"
  - "Hero banners, cards, and responsive design"
  - "Markdown-style links support"
  - "Zero dependencies - pure Python"
  - "Command-line interface for easy usage"

# Quick start
quick_start:
  - "Install: `pip install sssstatic`"
  - "Create: `sssstatic create new`"
  - "Build: `sssstatic build`"
  - "Serve: `sssstatic serve`"

# Project cards
_card:
  - name: "GitHub Repository"
    description: "Source code, issues, and contributions"
    url: "https://github.com/oldmill1/sssstatic"
    status: "active"
  - name: "PyPI Package"
    description: "Install SSSStatic from PyPI"
    url: "https://pypi.org/project/sssstatic/"
    status: "active"
  - name: "Documentation"
    description: "Complete configuration guide"
    url: "https://github.com/oldmill1/sssstatic/blob/main/CONFIG_GUIDE.md"
    status: "active"

# Footer
_footer:
  headline: "Built with ❤️ by [Ankur Taxali](https://github.com/oldmill1) | [Star on GitHub](https://github.com/oldmill1/sssstatic)"

# Multi-page configuration
_page:
  # Documentation Page
  - _name: "Documentation"
    _title: "SSSStatic Documentation"
    _footer:
      headline: "Need help? Check the [Configuration Guide](https://github.com/oldmill1/sssstatic/blob/main/CONFIG_GUIDE.md)"
    
    installation:
      - "Install from PyPI: `pip install sssstatic`"
      - "Install from source: `pip install -e .`"
      - "Verify installation: `sssstatic --help`"
    
    basic_usage:
      - "Create new project: `sssstatic create new`"
      - "Edit `_config.yml` with your content"
      - "Build the site: `sssstatic build`"
      - "Preview locally: `sssstatic serve`"
      - "Deploy to any static hosting service"
    
    configuration_structure:
      - "`site_name` - Your site's name"
      - "`_theme` - Choose 'dark' or 'light'"
      - "`_title` - Page title (optional)"
      - "`_card` - Project showcase cards"
      - "`_footer` - Custom footer with links"
      - "`_page` - Multi-page support"
    
    content_sections:
      - "Add any YAML structure for content"
      - "Lists become ordered lists in HTML"
      - "Nested objects become sections with headings"
      - "Use markdown-style links: `[text](url)`"
      - "Images go in `assets/` folder"
    
    multi_page_feature:
      - "Use `_page` component to create additional pages"
      - "Each page needs `_name` field for filename"
      - "Pages can have their own `_title` and `_footer`"
      - "Automatic navigation between pages"
      - "Supports both single pages and page arrays"

